<div id="ngram-moodle-demo"></div>

<style>
  #ngram-moodle-demo {
    --ng-bg: #f8fafc;
    --ng-panel: #ffffff;
    --ng-panel-soft: #f1f5f9;
    --ng-text: #0f172a;
    --ng-muted: #475569;
    --ng-accent: #0284c7;
    --ng-accent-soft: #e0f2fe;
    --ng-border: #cbd5e1;
    --ng-success: #166534;
    --ng-success-bg: #dcfce7;
    --ng-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    font-family: Arial, Helvetica, sans-serif;
    color: var(--ng-text);
    line-height: 1.5;
    margin: 1rem 0;
  }

  #ngram-moodle-demo * {
    box-sizing: border-box;
  }

  #ngram-moodle-demo .ng-wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  #ngram-moodle-demo .ng-title {
    margin: 0 0 0.35rem;
    font-size: 1.8rem;
    line-height: 1.2;
  }

  #ngram-moodle-demo .ng-subtitle {
    margin: 0 0 1rem;
    color: var(--ng-muted);
  }

  #ngram-moodle-demo .ng-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    background: var(--ng-panel);
    border: 1px solid var(--ng-border);
    border-radius: 14px;
    padding: 0.9rem 1rem;
    box-shadow: var(--ng-shadow);
    margin-bottom: 1rem;
  }

  #ngram-moodle-demo .ng-control-group {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  #ngram-moodle-demo label {
    font-weight: bold;
  }

  #ngram-moodle-demo select,
  #ngram-moodle-demo button,
  #ngram-moodle-demo textarea {
    font: inherit;
  }

  #ngram-moodle-demo select,
  #ngram-moodle-demo textarea {
    border: 1px solid var(--ng-border);
    border-radius: 10px;
    background: #fff;
    color: var(--ng-text);
  }

  #ngram-moodle-demo select,
  #ngram-moodle-demo button {
    padding: 0.6rem 0.8rem;
  }

  #ngram-moodle-demo button {
    border: 1px solid var(--ng-border);
    border-radius: 999px;
    background: var(--ng-panel-soft);
    color: var(--ng-text);
    cursor: pointer;
  }

  #ngram-moodle-demo button:hover {
    border-color: var(--ng-accent);
    background: var(--ng-accent-soft);
  }

  #ngram-moodle-demo .ng-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
  }

  #ngram-moodle-demo .ng-panel {
    background: var(--ng-panel);
    border: 1px solid var(--ng-border);
    border-radius: 16px;
    padding: 1rem;
    box-shadow: var(--ng-shadow);
    min-height: 420px;
  }

  #ngram-moodle-demo .ng-panel h2 {
    margin-top: 0;
    margin-bottom: 0.35rem;
    font-size: 1.2rem;
  }

  #ngram-moodle-demo .ng-lead {
    color: var(--ng-muted);
    margin-top: 0;
  }

  #ngram-moodle-demo .ng-badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    margin-left: 0.35rem;
    border-radius: 999px;
    font-size: 0.8rem;
    background: var(--ng-accent-soft);
    color: var(--ng-accent);
    border: 1px solid #bae6fd;
    vertical-align: middle;
  }

  #ngram-moodle-demo .ng-list,
  #ngram-moodle-demo .ng-legend {
    display: grid;
    gap: 0.6rem;
  }

  #ngram-moodle-demo .ng-list-item,
  #ngram-moodle-demo .ng-note,
  #ngram-moodle-demo .ng-step-box,
  #ngram-moodle-demo .ng-empty {
    border: 1px solid var(--ng-border);
    border-radius: 12px;
    background: var(--ng-panel-soft);
  }

  #ngram-moodle-demo .ng-list-item {
    padding: 0.75rem;
  }

  #ngram-moodle-demo .ng-list-item.ng-match {
    border-color: var(--ng-accent);
    background: var(--ng-accent-soft);
  }

  #ngram-moodle-demo textarea {
    width: 100%;
    min-height: 160px;
    padding: 0.8rem;
    resize: vertical;
  }

  #ngram-moodle-demo textarea:focus,
  #ngram-moodle-demo select:focus {
    outline: 2px solid var(--ng-accent-soft);
    border-color: var(--ng-accent);
  }

  #ngram-moodle-demo .ng-chip-row,
  #ngram-moodle-demo .ng-token-row,
  #ngram-moodle-demo .ng-prediction-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  #ngram-moodle-demo .ng-chip {
    background: #fff;
  }

  #ngram-moodle-demo .ng-step-box {
    padding: 0.9rem;
    margin-top: 1rem;
  }

  #ngram-moodle-demo .ng-token {
    padding: 0.45rem 0.75rem;
    border-radius: 999px;
    border: 1px solid var(--ng-border);
    background: #fff;
    opacity: 0;
    transform: translateY(6px);
    animation: ng-pop-in 0.25s forwards;
  }

  #ngram-moodle-demo .ng-token.ng-context {
    border-color: var(--ng-accent);
    background: var(--ng-accent-soft);
    font-weight: bold;
  }

  #ngram-moodle-demo .ng-arrow {
    font-size: 1.2rem;
    color: var(--ng-accent);
    margin: 0.6rem 0;
  }

  #ngram-moodle-demo .ng-candidate {
    min-width: 120px;
    padding: 0.7rem 0.8rem;
    border-radius: 12px;
    border: 1px solid #bae6fd;
    background: #f0fdf4;
    opacity: 0;
    transform: translateX(8px);
    animation: ng-slide-in 0.25s forwards;
  }

  #ngram-moodle-demo .ng-small {
    font-size: 0.88rem;
    color: var(--ng-muted);
  }

  #ngram-moodle-demo .ng-note,
  #ngram-moodle-demo .ng-empty {
    padding: 0.8rem;
    margin-top: 1rem;
  }

  #ngram-moodle-demo .ng-test-status {
    margin-top: 0.75rem;
    padding: 0.55rem 0.75rem;
    border-radius: 10px;
    background: var(--ng-success-bg);
    color: var(--ng-success);
    font-size: 0.92rem;
  }

  @keyframes ng-pop-in {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes ng-slide-in {
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @media (max-width: 1000px) {
    #ngram-moodle-demo .ng-grid {
      grid-template-columns: 1fr;
    }

    #ngram-moodle-demo .ng-panel {
      min-height: auto;
    }
  }
</style>

<script>
(function () {
  var root = document.getElementById("ngram-moodle-demo");
  if (!root) return;

  root.innerHTML = `
    <div class="ng-wrap">
      <h1 class="ng-title">Animierte n-Gramm-Demo</h1>
      <p class="ng-subtitle">
        Links stehen die gelernten Sätze. In der Mitte gibst du Text ein. Rechts siehst du live,
        wie ein n-Gramm-System den letzten Kontext auswählt und daraus mögliche Fortsetzungen ableitet.
        Stellbar für <strong>n = 1 bis 3</strong>.
      </p>

      <div class="ng-controls">
        <div class="ng-control-group">
          <label for="ngram-nSelect">n-Gramm:</label>
          <select id="ngram-nSelect">
            <option value="1">n = 1 (Unigramm)</option>
            <option value="2">n = 2 (Bigramm)</option>
            <option value="3" selected>n = 3 (Trigramm)</option>
          </select>
        </div>
        <div class="ng-control-group">
          <button id="ngram-clearBtn" type="button">Eingabe leeren</button>
          <button id="ngram-sampleBtn" type="button">Beispiel laden</button>
        </div>
      </div>

      <div class="ng-grid">
        <section class="ng-panel">
          <h2>Trainingsdaten</h2>
          <p class="ng-lead">Diese Sätze bilden das gelernte Wissen des n-Gramm-Modells.</p>
          <div id="ngram-corpusList" class="ng-list"></div>
          <div id="ngram-testStatus" class="ng-test-status" hidden></div>
        </section>

        <section class="ng-panel">
          <h2>Deine Eingabe</h2>
          <p class="ng-lead">Schreib einzelne Wörter oder Sätze. Das System verwendet die letzten Wörter als Kontext.</p>
          <textarea id="ngram-inputText" placeholder="Zum Beispiel: ich gehe in die ..."></textarea>

          <div class="ng-chip-row" style="margin-top: 0.9rem;">
            <button class="ng-chip" type="button" data-text="ich gehe in die">ich gehe in die</button>
            <button class="ng-chip" type="button" data-text="wir lernen mit">wir lernen mit</button>
            <button class="ng-chip" type="button" data-text="das wetter ist">das wetter ist</button>
            <button class="ng-chip" type="button" data-text="ich trinke gerne">ich trinke gerne</button>
          </div>

          <div class="ng-step-box">
            <div><strong>Tokenisierung:</strong> Die Eingabe wird in Wörter zerlegt.</div>
            <div class="ng-token-row" id="ngram-tokenRow" style="margin-top: 0.75rem;"></div>
          </div>

          <div class="ng-legend" style="margin-top: 1rem;">
            <div class="ng-note">Hell markierte Tokens = der aktuelle Kontext, den das n-Gramm-Modell benutzt.</div>
            <div class="ng-note">Je größer n ist, desto mehr letzte Wörter werden berücksichtigt.</div>
          </div>
        </section>

        <section class="ng-panel">
          <h2>Vorhersage des Systems <span class="ng-badge" id="ngram-modeBadge">Trigramm</span></h2>
          <p class="ng-lead">Rechts wird gezeigt, wie das Modell den Kontext auswählt und welche Fortsetzungen dazu im Trainingskorpus vorkommen.</p>

          <div class="ng-step-box">
            <div><strong>Schritt 1:</strong> Ausgewählter Kontext</div>
            <div class="ng-token-row" id="ngram-contextRow" style="margin-top: 0.75rem;"></div>
            <div class="ng-arrow">→</div>
            <div><strong>Schritt 2:</strong> Mögliche nächste Wörter</div>
            <div class="ng-prediction-row" id="ngram-predictionRow" style="margin-top: 0.75rem;"></div>
          </div>

          <div class="ng-step-box" id="ngram-explanationBox">Noch keine Eingabe vorhanden.</div>
          <div class="ng-empty" id="ngram-fallbackBox" hidden>
            Für diesen Kontext gibt es im kleinen Beispielkorpus keine direkte Fortsetzung. Probier z. B. „ich gehe in die“.
          </div>
        </section>
      </div>
    </div>
  `;

  var corpus = [
    "ich gehe in die schule",
    "ich gehe in die stadt",
    "ich gehe in den park",
    "ich gehe heute nach hause",
    "ich trinke gerne kaffee",
    "ich trinke gerne tee",
    "ich esse gerne pizza",
    "wir lernen mit einem modell",
    "wir lernen mit beispielen",
    "wir lernen heute javascript",
    "das wetter ist heute schön",
    "das wetter ist morgen kalt",
    "das wetter wird besser",
    "die sonne scheint heute",
    "die kinder spielen im park",
    "ein modell sagt das nächste wort voraus",
    "ein n gramm modell nutzt wahrscheinlichkeiten",
    "sprache besteht aus wörtern",
    "das modell betrachtet die letzten wörter",
    "heute ist ein schöner tag"
  ];

  var inputText = root.querySelector("#ngram-inputText");
  var tokenRow = root.querySelector("#ngram-tokenRow");
  var contextRow = root.querySelector("#ngram-contextRow");
  var predictionRow = root.querySelector("#ngram-predictionRow");
  var explanationBox = root.querySelector("#ngram-explanationBox");
  var fallbackBox = root.querySelector("#ngram-fallbackBox");
  var nSelect = root.querySelector("#ngram-nSelect");
  var modeBadge = root.querySelector("#ngram-modeBadge");
  var clearBtn = root.querySelector("#ngram-clearBtn");
  var sampleBtn = root.querySelector("#ngram-sampleBtn");
  var corpusList = root.querySelector("#ngram-corpusList");
  var testStatus = root.querySelector("#ngram-testStatus");
  var chips = root.querySelectorAll(".ng-chip");

  function normalize(text) {
    return String(text)
      .toLowerCase()
      .replace(/[.,!?;:()\[\]"]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function tokenize(text) {
    var clean = normalize(text);
    return clean ? clean.split(" ") : [];
  }

  function buildModel(n) {
    var contextSize = Math.max(0, n - 1);
    var counts = new Map();

    corpus.forEach(function (sentence) {
      var words = tokenize(sentence);
      for (var i = contextSize; i < words.length; i += 1) {
        var context = words.slice(i - contextSize, i);
        var key = context.join(" ");
        var nextWord = words[i];

        if (!counts.has(key)) {
          counts.set(key, new Map());
        }

        var nextMap = counts.get(key);
        nextMap.set(nextWord, (nextMap.get(nextWord) || 0) + 1);
      }
    });

    return counts;
  }

  function labelForN(n) {
    if (n === 1) return "Unigramm";
    if (n === 2) return "Bigramm";
    return "Trigramm";
  }

  function getPredictionsForInput(text, n) {
    var tokens = tokenize(text);
    var contextSize = Math.max(0, n - 1);
    var context = contextSize === 0 ? [] : tokens.slice(-contextSize);
    var key = context.join(" ");
    var model = buildModel(n);
    var nextMap = model.get(key) || new Map();
    var sorted = Array.from(nextMap.entries()).sort(function (a, b) {
      if (b[1] !== a[1]) return b[1] - a[1];
      return a[0].localeCompare(b[0]);
    });

    return { tokens: tokens, context: context, key: key, sorted: sorted };
  }

  function sentenceMatchesContext(sentence, context) {
    if (!context.length) return false;
    var words = tokenize(sentence);
    for (var i = 0; i <= words.length - context.length; i += 1) {
      var slice = words.slice(i, i + context.length).join(" ");
      if (slice === context.join(" ")) return true;
    }
    return false;
  }

  function renderTokens(tokens, container, highlightFrom) {
    container.innerHTML = "";
    if (!tokens.length) return;

    tokens.forEach(function (token, index) {
      var el = document.createElement("div");
      el.className = "ng-token";
      if (typeof highlightFrom === "number" && index >= highlightFrom) {
        el.className += " ng-context";
      }
      el.textContent = token;
      el.style.animationDelay = (index * 40) + "ms";
      container.appendChild(el);
    });
  }

  function renderPredictions(entries) {
    predictionRow.innerHTML = "";
    entries.forEach(function (entry, index) {
      var word = entry[0];
      var count = entry[1];
      var el = document.createElement("div");
      el.className = "ng-candidate";
      el.style.animationDelay = (index * 90) + "ms";
      el.innerHTML = "<strong>" + word + "</strong><br><span class=\"ng-small\">Treffer im Korpus: " + count + "</span>";
      predictionRow.appendChild(el);
    });
  }

  function renderCorpus(activeContext) {
    corpusList.innerHTML = "";
    corpus.forEach(function (sentence) {
      var el = document.createElement("div");
      el.className = "ng-list-item";
      if (activeContext && sentenceMatchesContext(sentence, activeContext)) {
        el.className += " ng-match";
      }
      el.textContent = sentence;
      corpusList.appendChild(el);
    });
  }

  function update() {
    var n = Number(nSelect.value);
    var contextSize = Math.max(0, n - 1);
    var result = getPredictionsForInput(inputText.value, n);
    var tokens = result.tokens;
    var context = result.context;
    var key = result.key;
    var sorted = result.sorted;

    modeBadge.textContent = labelForN(n);
    renderTokens(tokens, tokenRow, contextSize === 0 ? null : Math.max(0, tokens.length - contextSize));
    renderTokens(context, contextRow, 0);
    renderCorpus(context);

    predictionRow.innerHTML = "";
    fallbackBox.hidden = true;

    if (!tokens.length && n > 1) {
      explanationBox.innerHTML = "<strong>So arbeitet das Modell:</strong><br>Bei n = " + n + " schaut es auf die letzten <strong>" + contextSize + "</strong> Wörter. Gib links Text ein, damit daraus ein Kontext gebildet werden kann.";
      return;
    }

    if (!sorted.length) {
      explanationBox.innerHTML = "<strong>Kein Treffer im Beispielkorpus.</strong><br>Das Modell sucht nach genau diesem Kontext: <strong>" + (key || "(leer)") + "</strong>. Findet es ihn nicht im Trainingsmaterial, kann es keine direkte Fortsetzung ableiten.";
      fallbackBox.hidden = false;
      return;
    }

    renderPredictions(sorted);
    explanationBox.innerHTML = "<strong>Erklärung:</strong><br>Das Modell verwendet <strong>n = " + n + "</strong> und damit einen Kontext aus <strong>" + contextSize + "</strong> Wort" + (contextSize === 1 ? "" : "en") + ".<br>Aktueller Kontext: <strong>" + (key || "(kein Kontext bei Unigramm)") + "</strong><br>Danach schaut es im Trainingskorpus nach, welche Wörter auf diesen Kontext folgen. Die Kandidaten rechts sind nach Häufigkeit sortiert.";
  }

  function runTests() {
    console.assert(normalize("  Hallo, Welt!  ") === "hallo welt", "normalize sollte Satzzeichen entfernen");

    var tok = tokenize("ich gehe in die");
    console.assert(tok.length === 4, "tokenize sollte 4 Tokens liefern");
    console.assert(tok[0] === "ich" && tok[3] === "die", "tokenize sollte richtige Reihenfolge liefern");

    var tri = getPredictionsForInput("ich gehe in die", 3);
    console.assert(tri.key === "in die", "Trigramm-Kontext sollte 'in die' sein");
    console.assert(tri.sorted.length === 2, "Fuer 'in die' sollten 2 Treffer existieren");

    var bi = getPredictionsForInput("ich trinke", 2);
    console.assert(bi.sorted.some(function (item) { return item[0] === "gerne"; }), "Bigramm sollte 'gerne' vorhersagen");

    var miss = getPredictionsForInput("unbekannter kontext", 3);
    console.assert(miss.sorted.length === 0, "Unbekannter Kontext sollte keine Treffer liefern");

    testStatus.hidden = false;
    testStatus.textContent = "Selbsttests erfolgreich geladen.";
  }

  inputText.addEventListener("input", update);
  nSelect.addEventListener("change", update);
  clearBtn.addEventListener("click", function () {
    inputText.value = "";
    update();
  });
  sampleBtn.addEventListener("click", function () {
    inputText.value = "ich gehe in die";
    update();
  });
  chips.forEach(function (chip) {
    chip.addEventListener("click", function () {
      inputText.value = chip.getAttribute("data-text") || "";
      update();
    });
  });

  renderCorpus([]);
  runTests();
  inputText.value = "ich gehe in die";
  update();
}());
</script>
